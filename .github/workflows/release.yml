name: Release

# A release is cut when a pull request is merged into `main` (normally the
# develop -> main PR). The PR must carry exactly one `release:` label, which
# decides the version bump; the PR body becomes the GitHub Release notes.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve version bump from the PR label
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          level=$(printf '%s' "$LABELS" | jq -r '.[]' | grep -E '^release:(major|minor|patch)$' | sed 's/release://' || true)
          count=$(printf '%s' "$level" | grep -c . || true)
          if [ "$count" -ne 1 ]; then
            echo "::error::Exactly one release label is required on the PR (release:major | release:minor | release:patch). Found: [${level//$'\n'/, }]"
            exit 1
          fi
          echo "level=$level" >> "$GITHUB_OUTPUT"
          echo "Bump level: $level"

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
          latest=${latest:-v0.0.0}
          ver=${latest#v}
          major=$(echo "$ver" | cut -d. -f1)
          minor=$(echo "$ver" | cut -d. -f2)
          patch=$(echo "$ver" | cut -d. -f3)
          case "${{ steps.bump.outputs.level }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "version=${new}" >> "$GITHUB_OUTPUT"
          echo "tag=v${new}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${latest} -> v${new}"

  verify:
    name: Verify
    needs: prepare
    uses: ./.github/workflows/verify.yml
    with:
      ref: main

  release:
    name: Build & publish (Chrome + Firefox)
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp release version
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build & zip (Chrome)
        run: npm run zip

      - name: Build & zip (Firefox)
        run: npm run zip:firefox

      - name: Prepare release notes
        env:
          BODY: ${{ github.event.pull_request.body }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          # Release notes = the PR description, then an auto-generated changelog
          # of the PRs merged since the previous tag.
          gen=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" -f target_commitish=main --jq '.body')
          {
            printf '%s\n\n' "$BODY"
            printf '%s\n' "$gen"
          } > release-notes.md

      - name: Publish GitHub Release
        run: |
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --target main \
            --title "Keyfount Extension ${{ needs.prepare.outputs.tag }}" \
            --notes-file release-notes.md \
            --latest \
            ./.output/*.zip

      # Auto-publishes to the Chrome Web Store. Inactive until the four CWS_*
      # secrets are set (skipped when CWS_CLIENT_ID is empty).
      - name: Publish to Chrome Web Store
        if: env.CWS_CLIENT_ID != ''
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4 # v6.0.0
        with:
          file-path: .output/*-chrome.zip
          glob: true
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true
